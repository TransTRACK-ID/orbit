name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Orbit version / commit
      placeholder: e.g. main @ abc1234

  - type: dropdown
    id: runtime
    attributes:
      label: Agent runtime (if applicable)
      options:
        - Not applicable
        - OpenCode
        - Cursor
        - Browser QA
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error messages or attach screenshots
