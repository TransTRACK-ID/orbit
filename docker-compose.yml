version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - AUTH_ORIGIN=${AUTH_ORIGIN:-http://localhost:3000}
    container_name: orbit-web
    ports:
      - "3031:3000"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - NUXT_AUTH_SECRET=${NUXT_AUTH_SECRET:-your-super-secret-key-at-least-32-chars-long}
      - AUTH_ORIGIN=${AUTH_ORIGIN:-http://localhost:3000}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PROJECT_DIR=/app
      - HOME=/root
      - OPENCODE_PATH=/root/.opencode/bin/opencode
      # Base64-encoded opencode.json (use: base64 -i opencode/opencode.json)
      - OPENCODE_CONFIG_BASE64=${OPENCODE_CONFIG_BASE64:-}
    volumes:
      # Mount the orbit-projects directory to preserve git clones between restarts
      - ~/orbit-projects:/root/orbit-projects
    restart: unless-stopped

volumes:
  orbit-pgdata:
