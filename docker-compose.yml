version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbit
    ports:
      - '5432:5432'
    volumes:
      - orbit-pgdata:/var/lib/postgresql/data

volumes:
  orbit-pgdata:
