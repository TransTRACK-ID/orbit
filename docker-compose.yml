version: '3.8'

services:
  orbit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbit-app
    # Port 3000 is internal only — nginx (in orbit-docs compose) proxies external traffic
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - NUXT_AUTH_SECRET=${NUXT_AUTH_SECRET:-your-super-secret-key-at-least-32-chars-long}
      - AUTH_ORIGIN=${AUTH_ORIGIN:-http://localhost:3000}
      - PROJECT_DIR=/app
      - HOME=/root
      - OPENCODE_PATH=/root/.opencode/bin/opencode
      # Base64-encoded opencode.json (use: base64 -i opencode/opencode.json)
      - OPENCODE_CONFIG_BASE64=${OPENCODE_CONFIG_BASE64:-}
      # Agent runtime selection: opencode (default) | cursor
      - AGENT_RUNTIME=${AGENT_RUNTIME:-opencode}
      - NUXT_AGENT_RUNTIME=${AGENT_RUNTIME:-opencode}
      - NUXT_PUBLIC_AGENT_RUNTIME=${AGENT_RUNTIME:-opencode}
      - CURSOR_AGENT_PATH=/usr/local/bin/cursor-agent
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - CURSOR_MODEL=${CURSOR_MODEL:-auto}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEB_CONTAINER_NAME=orbit-app
    volumes:
      # Mount the orbit-projects directory to preserve git clones between restarts
      - ~/orbit-projects:/root/orbit-projects
      # Mount Docker socket so the web container can spawn sibling browser-agent containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - orbit-shared
    restart: unless-stopped

  # Build-only service: ensures orbit/browser-agent:latest image exists on the host
  browser-agent:
    build:
      context: ./docker/browser-agent
      dockerfile: Dockerfile
    image: orbit/browser-agent:latest
    entrypoint: ["sh", "-c", "echo 'Browser agent image built successfully' && exit 0"]
    restart: "no"

# Shared network with orbit-docs nginx reverse proxy
networks:
  orbit-shared:
    external: true

volumes:
  orbit-pgdata:
